name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: vtopssh

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Derive release version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build deb package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/debian
          cargo deb --no-build --output "target/debian/${BIN_NAME}_${VERSION}_amd64.deb"

      - name: Bundle tarball
        shell: bash
        run: |
          set -euo pipefail
          tar -C target/release -czf "${BIN_NAME}-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" "${BIN_NAME}"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum \
            "${BIN_NAME}-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            "target/debian/${BIN_NAME}_${VERSION}_amd64.deb" \
            > "${BIN_NAME}-${GITHUB_REF_NAME}-checksums.txt"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vtopssh-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            vtopssh-${{ github.ref_name }}-checksums.txt
            target/debian/vtopssh_${{ env.VERSION }}_amd64.deb
